<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI产品经理学习网站</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <nav class="shell-nav">
    <a class="brand" href="index.html">
      <span class="brand-mark">AI</span>
      <span>AI产品经理学习网站</span>
    </a>
    <button class="theme-toggle magnetic" id="theme-toggle" type="button">切换风格</button>
  </nav>

  <header class="hero home-hero">
    <section class="hero-content reveal">
      <h1>AI产品经理学习网站</h1>
      <p class="hero-text">记录我的学习、项目和AI工作流。</p>
    </section>

    <aside class="system-panel reveal" aria-label="学习进度">
      <div class="panel-topline">
        <span>学习进度</span>
        <strong id="total-count">0</strong>
      </div>
      <div class="signal-grid" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <p>每天一点点，慢慢形成自己的 AI 产品经理知识库。</p>
    </aside>
  </header>

  <main class="layout">
    <section class="dashboard compact-dashboard" id="section-dashboard"></section>
  </main>

  <footer class="footer">
    <p>Built for LiuWanli · AI Product Manager Learning Journey</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
