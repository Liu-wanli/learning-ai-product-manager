    <h1>Day01｜GitHub常用英语</h1>
    <p>今天整理一些搭建网站时遇到的 GitHub 高频词。</p>

    <section class="word-grid">
      <div class="word-item"><strong>repository</strong>：仓库，用来保存项目文件。</div>
      <div class="word-item"><strong>commit</strong>：提交，把本次修改保存到仓库历史里。</div>
      <div class="word-item"><strong>branch</strong>：分支，可以理解成项目的一条版本线。</div>
      <div class="word-item"><strong>deploy</strong>：部署，把网站发布出去，让别人可以访问。</div>
      <div class="word-item"><strong>workflow</strong>：工作流，GitHub Actions 里自动执行任务的规则。</div>
    </section>
